name: Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  dor-check:
    name: Definition of Ready
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Definition of Ready
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python scripts/check_dor.py

  no-test-no-merge:
    name: No Test No Merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check test coverage correlation
        run: python scripts/check_test_coverage.py ${{ github.base_ref }}

  backend-test:
    name: Backend Test (RSpec + regression net)
    needs: [dor-check, no-test-no-merge]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_test
      REDIS_URL: redis://localhost:6379/0
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          working-directory: api
          bundler-cache: true
      - name: Setup database
        run: bundle exec rails db:create db:schema:load
      - name: Run RSpec (includes F1 / F4 regression specs)
        run: bundle exec rspec

  frontend-checks:
    name: Frontend Lint / Test / Build
    needs: [dor-check, no-test-no-merge]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  quality-gate-summary:
    name: Quality Gate Summary
    needs: [backend-test, frontend-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check overall status
        run: |
          if [ "${{ needs.backend-test.result }}" != "success" ] || \
             [ "${{ needs.frontend-checks.result }}" != "success" ]; then
            echo "Quality Gate: FAILED"
            exit 1
          fi
          echo "Quality Gate: PASSED"
